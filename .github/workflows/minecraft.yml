name: Minecraft Server

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: 'Nome do servidor'
        required: true
        default: 'ZAIROMC'
      version:
        description: 'Versao do Minecraft'
        required: true
        default: '1.20.4'
      max_players:
        description: 'Maximo de jogadores'
        required: true
        default: '20'
      motd:
        description: 'Descricao do servidor'
        required: true
        default: 'Bem-vindo ao ZAIROMC!'
      server_type:
        description: 'Tipo (vanilla/paper/fabric)'
        required: true
        default: 'paper'
      restart_count:
        description: 'Numero de reinicios (interno)'
        required: false
        default: '0'

jobs:
  minecraft:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Instalar dependencias
        run: sudo apt-get install -y curl jq screen unzip

      - name: Instalar ngrok
        run: |
          curl -fsSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar -xzf ngrok.tgz
          sudo mv ngrok /usr/local/bin/ngrok
          ngrok version

      - name: Configurar ngrok
        run: ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}

      - name: Restaurar mundo salvo (se existir)
        run: |
          if [ -f "world-backup.tar.gz" ]; then
            echo "Restaurando mundo salvo..."
            mkdir -p server
            tar -xzf world-backup.tar.gz -C server/ 2>/dev/null || true
          fi

      - name: Baixar servidor
        run: |
          mkdir -p server && cd server
          TYPE="${{ github.event.inputs.server_type }}"
          VERSION="${{ github.event.inputs.version }}"
          echo "Baixando $TYPE $VERSION..."

          if [ "$TYPE" = "paper" ]; then
            BUILDS=$(curl -sf "https://api.papermc.io/v2/projects/paper/versions/${VERSION}/builds" || echo "")
            if [ -z "$BUILDS" ]; then
              echo "Versao $VERSION nao encontrada, usando 1.20.4..."
              VERSION="1.20.4"
              BUILDS=$(curl -sf "https://api.papermc.io/v2/projects/paper/versions/${VERSION}/builds")
            fi
            BUILD=$(echo "$BUILDS" | jq -r '.builds[-1].build')
            JAR="paper-${VERSION}-${BUILD}.jar"
            echo "Baixando Paper $VERSION build $BUILD..."
            curl -fsSL "https://api.papermc.io/v2/projects/paper/versions/${VERSION}/builds/${BUILD}/downloads/${JAR}" -o server.jar
          elif [ "$TYPE" = "fabric" ]; then
            LOADER=$(curl -sf "https://meta.fabricmc.net/v2/versions/loader/${VERSION}" | jq -r '.[0].loader.version' || echo "")
            if [ -z "$LOADER" ]; then
              VERSION="1.20.4"
              LOADER=$(curl -sf "https://meta.fabricmc.net/v2/versions/loader/${VERSION}" | jq -r '.[0].loader.version')
            fi
            curl -fsSL "https://meta.fabricmc.net/v2/versions/loader/${VERSION}/${LOADER}/1.0.1/server/jar" -o server.jar
          else
            MANIFEST=$(curl -sf "https://launchermeta.mojang.com/mc/game/version_manifest.json")
            URL=$(echo "$MANIFEST" | jq -r --arg v "$VERSION" '.versions[] | select(.id==$v) | .url')
            SERVER_URL=$(curl -sf "$URL" | jq -r '.downloads.server.url')
            curl -fsSL "$SERVER_URL" -o server.jar
          fi

          ls -lh server.jar

      - name: Configurar servidor
        run: |
          cd server
          echo "eula=true" > eula.txt
          cat > server.properties << 'EOF'
server-name=${{ github.event.inputs.server_name }}
motd=${{ github.event.inputs.motd }}
max-players=${{ github.event.inputs.max_players }}
online-mode=false
difficulty=normal
gamemode=survival
view-distance=10
pvp=true
spawn-monsters=true
spawn-animals=true
server-port=25565
EOF

      - name: Iniciar servidor em background
        run: |
          cd server
          screen -dmS mc java -Xms1G -Xmx3G -jar server.jar nogui
          echo "Aguardando servidor iniciar (40s)..."
          sleep 40
          screen -list || true

      - name: Iniciar ngrok e capturar endereco
        run: |
          ngrok tcp 25565 --log=stdout > /tmp/ngrok.log 2>&1 &
          sleep 10
          NGROK_INFO=$(curl -sf http://localhost:4040/api/tunnels || echo "{}")
          echo "Ngrok tunnels: $NGROK_INFO"
          ADDR=$(echo "$NGROK_INFO" | jq -r '.tunnels[0].public_url // ""' | sed 's/tcp:\/\///')
          HOST=$(echo "$ADDR" | cut -d: -f1)
          PORT=$(echo "$ADDR" | cut -d: -f2)
          echo "SERVER_HOST=$HOST" >> $GITHUB_ENV
          echo "SERVER_PORT=$PORT" >> $GITHUB_ENV
          echo "IP: $HOST:$PORT"
          echo "{\"host\":\"$HOST\",\"port\":\"$PORT\",\"name\":\"${{ github.event.inputs.server_name }}\",\"version\":\"${{ github.event.inputs.version }}\",\"status\":\"online\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > server-address.json

      - name: Commit do endereco do servidor
        run: |
          git config user.name "ZAIROMC Bot"
          git config user.email "bot@zairomc.gg"
          git add server-address.json
          git commit -m "Servidor online" || true
          git push || true

      - name: Manter servidor por 5h50min
        run: |
          echo "Servidor rodando. Reinicio em 5h50min..."
          sleep 21000
          cd server
          screen -S mc -X stuff "save-all\n" || true
          sleep 10
          screen -S mc -X stuff "stop\n" || true
          sleep 15
          cd ..
          tar -czf world-backup.tar.gz server/world server/world_nether server/world_the_end 2>/dev/null || true
          git config user.name "ZAIROMC Bot"
          git config user.email "bot@zairomc.gg"
          git add world-backup.tar.gz
          git commit -m "Backup do mundo" || true
          git push || true

      - name: Auto-restart
        if: always()
        run: |
          RESTART_COUNT=$(( ${{ github.event.inputs.restart_count }} + 1 ))
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/joaovitirfds28/ZAIROMC/actions/workflows/minecraft.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"server_name\":\"${{ github.event.inputs.server_name }}\",\"version\":\"${{ github.event.inputs.version }}\",\"max_players\":\"${{ github.event.inputs.max_players }}\",\"motd\":\"${{ github.event.inputs.motd }}\",\"server_type\":\"${{ github.event.inputs.server_type }}\",\"restart_count\":\"$RESTART_COUNT\"}}"
          echo "Novo ciclo: $RESTART_COUNT"
